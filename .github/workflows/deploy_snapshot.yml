name: Deploy snapshot with Maven

on:
  push:
    branches:
      - develop
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build SidebarLib from source
        run: |
          git clone --depth=1 --branch=25.9 https://github.com/andrei1058/SidebarLib.git /tmp/SidebarLib
          cd /tmp/SidebarLib
          mvn versions:set -DnewVersion=25.9 -q
          mvn versions:update-child-modules -q
          mvn clean install -DskipTests -q
      - name: Deploy snapshot with Maven
        env:
          MVN_REPO_USER: ${{ secrets.MVN_REPO_USER }}
          MVN_REPO_PASS: ${{ secrets.MVN_REPO_PASS }}
          ANDEV_RES_ID: 1
        run: |
          mvn clean install -DskipTests
